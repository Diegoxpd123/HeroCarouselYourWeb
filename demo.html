<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>YourWeb Hero Carousel Demo</title>
    <style>
      body {
        margin: 0;
        background: #111;
      }
    </style>
  </head>
  <body>
    <yourweb-hero-carousel
      brand="PETCARE"
      ghost-text="PETCARE"
      eyebrow="Veterinaria moderna"
      title="Cuidado para mascotas con estilo"
      body="Animacion configurable para Wix: cambia imagenes, videos, fondos RGB, tamanos, textos y velocidad desde atributos."
      cta-label="Agendar cita"
      cta-href="#contacto"
      bg-1="rgb(244, 132, 95)"
      bg-2="rgb(107, 191, 122)"
      bg-3="rgb(232, 130, 180)"
      bg-4="rgb(110, 181, 255)"
      controls="on"
      interval="1000">
    </yourweb-hero-carousel>

    <script src="./yourweb-hero-carousel.js" defer></script>
  </body>
</html>
